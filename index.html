<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Emotion Care</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    background:#f4f6f9;
    min-height:100vh;
    text-align:center;
    transition:0.5s;
}

header{
    background:#4f46e5;
    color:white;
    padding:25px;
}

h1{
    margin-bottom:10px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#webcam-container{
    margin-top:20px;
}

#result{
    margin-top:20px;
    font-size:30px;
    font-weight:bold;
}

#emoji{
    font-size:80px;
    margin-top:15px;
}

#message{
    font-size:22px;
    margin-top:15px;
    line-height:1.6;
}

iframe{
    margin-top:20px;
    border-radius:15px;
    max-width:100%;
}

#confidence{
    margin-top:10px;
    font-size:18px;
    color:#555;
}

</style>
</head>

<body>

<header>
<h1>😊 AI Emotion Care</h1>
<p>감정을 인식하고 맞춤형 위로와 음악을 제공합니다.</p>
</header>

<div class="container">

<div class="card">

<button onclick="init()">카메라 시작</button>

<div id="webcam-container"></div>

<div id="result">감정 분석 대기중...</div>

<div id="confidence"></div>

<div id="emoji"></div>

<div id="message"></div>

<div id="youtubePlayer"></div>

</div>

</div>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/QIdOVq0HI/";

let model, webcam;
let currentEmotion = "";

async function init() {

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    webcam = new tmImage.Webcam(300,300,true);

    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);
}

async function loop() {

    webcam.update();

    await predict();

    window.requestAnimationFrame(loop);
}

async function predict() {

    const prediction = await model.predict(webcam.canvas);

    let best = prediction[0];

    for(let i=1;i<prediction.length;i++){

        if(prediction[i].probability > best.probability){

            best = prediction[i];
        }
    }

    document.getElementById("confidence").innerHTML =
        "신뢰도 : " + (best.probability*100).toFixed(1) + "%";

    if(best.probability > 0.85){

        if(currentEmotion !== best.className){

            currentEmotion = best.className;

            showEmotion(
                best.className,
                best.probability
            );
        }
    }
}

function showEmotion(emotion, probability){

    const result =
        document.getElementById("result");

    const message =
        document.getElementById("message");

    const emoji =
        document.getElementById("emoji");

    const player =
        document.getElementById("youtubePlayer");

    result.innerHTML =
        "감정 분석 결과 : " + emotion;

    if(emotion==="Happy"){

        document.body.style.background="#FFF8B5";

        emoji.innerHTML="🎉😄🎉";

        message.innerHTML=
        "오늘 정말 행복해 보이네요! 행복한 순간을 마음껏 즐겨보세요.";

        player.innerHTML=
        `<iframe width="560" height="315"
        src="https://www.youtube.com/embed/Unfqj83RUOQ"
        allowfullscreen></iframe>`;
    }

    else if(emotion==="Sad"){

        document.body.style.background="#D6EAF8";

        emoji.innerHTML="💙😢💙";

        message.innerHTML=
        "힘든 순간도 지나갑니다. 당신은 충분히 잘하고 있어요.";

        player.innerHTML=
        `<iframe width="560" height="315"
        src="https://www.youtube.com/embed/gGpPkfFN6pA"
        allowfullscreen></iframe>`;
    }

    else if(emotion==="Angry"){

        document.body.style.background="#AED6F1";

        emoji.innerHTML="🌿😌🌿";

        message.innerHTML=
        "잠시 숨을 크게 쉬어보세요. 지금도 충분히 잘하고 있습니다.";

        player.innerHTML=
        `<iframe width="560" height="315"
        src="https://www.youtube.com/embed/9zzT7QIjUEI"
        allowfullscreen></iframe>`;
    }

    else if(emotion==="Fear"){

        document.body.style.background="#FFE6F0";

        emoji.innerHTML="🐰🐻✨";

        message.innerHTML=
        "무서워하지 마! 귀여운 친구들이 항상 응원하고 있어!";

        player.innerHTML=
        `<iframe width="560" height="315"
        src="https://www.youtube.com/embed/oFEZMVMnlRI"
        allowfullscreen></iframe>`;
    }

    else if(emotion==="Disgust"){

        document.body.style.background=
        "linear-gradient(90deg,#ff4d4d,#ffcc00,#66ff66,#66ccff,#9966ff)";

        emoji.innerHTML="🌈✨🌈";

        message.innerHTML=
        "기분 전환! 아름다운 무지개처럼 새로운 기분을 가져보자!";

        player.innerHTML=
        `<iframe width="560" height="315"
        src="https://www.youtube.com/embed/8zs4iHSi0O8"
        allowfullscreen></iframe>`;
    }
}

</script>

</body>
</html>
